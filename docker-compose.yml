# uchat.sohoclouds.com 生产编排
# 启动: docker compose --env-file .env.production up -d --build
#   --env-file 让 compose 也从 .env.production 读变量插值 (如 MYSQL_ROOT_PASSWORD),
#   与 backend 容器共用同一份配置, 避免 DB 密码两处维护不一致。
# 前置: 写好 .env.production (后端+DB) + frontend/dist 已构建 + TLS 证书就位 (见 DEPLOY.md)

services:
  mysql:
    image: mysql:5.7
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set in shell env or .env}
      MYSQL_DATABASE: saas_agent_db
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - ./data/mysql:/var/lib/mysql
      # 首次启动: 加载 database.sql 快照, 记录/执行 migrations/*.sql。
      # 注意 Docker MySQL 只在 /var/lib/mysql 为空时执行 initdb.d。
      - ./docker/mysql/init/00_schema_and_migrations.sh:/docker-entrypoint-initdb.d/00_schema_and_migrations.sh:ro
      - ./database.sql:/docker-entrypoint-initdb.d/schema/database.sql:ro
      - ./migrations:/docker-entrypoint-initdb.d/migrations:ro
    # 仅内网, 不对外映射端口
    expose:
      - "3306"
    ports:
      - "127.0.0.1:3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - ./data/qdrant:/qdrant/storage
    expose:
      - "6333"
      - "6334"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: .
    restart: unless-stopped
    environment:
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-2}
    volumes:
      # 把生产配置挂成 /app/.env, 让 config.py 的 pydantic (env_file=".env") 直接读它。
      # 比 compose 的 env_file 指令更稳: 正确剥引号、与本地开发加载方式一致、文件不进镜像更安全。
      - ./.env.production:/app/.env:ro
      # 持久化: 上传媒体 + 日志。向量库/记忆由独立 qdrant 服务持久化。
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    expose:
      - "1081"
    depends_on:
      mysql:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:10080:80"
      - "127.0.0.1:10443:443"
    volumes:
      - ./nginx/uchat.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      # Let's Encrypt 证书 + ACME 验证目录
      - ./data/letsencrypt:/etc/letsencrypt:ro
      - ./data/certbot-www:/var/www/certbot
    depends_on:
      - backend
